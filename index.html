<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SIAF-PJEV · KPI</title>
<style>
:root{
  --bg:#f5f5f3;--bg2:#fff;--bg3:#f0ede6;
  --t:#1a1a1a;--t2:#5f5e5a;--t3:#888780;
  --bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.18);
  --gr:#1D9E75;--grb:#e1f5ee;--grt:#085041;
  --bl:#378ADD;--blb:#e6f1fb;--blt:#0c447c;
  --am:#BA7517;--amb:#faeeda;--amt:#412402;
  --pu:#7F77DD;--pub:#eeedfe;--put:#26215c;
  --r:10px;--rs:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#2c2c2a;
  --t:#e8e6e0;--t2:#b4b2a9;--t3:#888780;
  --bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.18);
  --grb:#04342c;--grt:#9fe1cb;--blb:#042c53;--blt:#b5d4f4;
  --amb:#412402;--amt:#fac775;--pub:#26215c;--put:#cecbf6;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.4}
/* topbar */
.top{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.top-t{font-size:15px;font-weight:600;flex:1}
.top-s{font-size:11px;color:var(--t2)}
.btn{padding:6px 11px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--bg3);color:var(--t);font-size:12px;cursor:pointer;white-space:nowrap}
.btn:active{opacity:.7}
/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg2);overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--bl);border-color:var(--bl);font-weight:500}
/* kpi grid */
.kg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:10px 14px}
@media(min-width:580px){.kg{grid-template-columns:repeat(4,1fr)}}
.kc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px}
.kv{font-size:19px;font-weight:600;line-height:1.2}
.kl{font-size:11px;color:var(--t2);margin-top:2px}
.ks{font-size:11px;color:var(--t3);margin-top:4px;padding-top:4px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap}
.ks b{color:var(--t);font-weight:500}
.ks span{color:var(--am)}
/* filtros */
.fl{padding:8px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fb{padding:5px 11px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg2);color:var(--t);font-size:12px;cursor:pointer}
.fb.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.sw{flex:1;min-width:120px}
.sw input{width:100%;padding:6px 10px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg2);color:var(--t);font-size:12px;outline:none}
/* módulos */
.mods{padding:0 14px 80px}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.mh{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;user-select:none}
.mh:active{background:var(--bg3)}
.chev{font-size:9px;color:var(--t3);transition:transform .18s;flex-shrink:0}
.chev.op{transform:rotate(90deg)}
.mn{font-weight:600;font-size:13px;flex:1}
.ms{display:flex;gap:5px;align-items:center}
.pp{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;color:#fff}
.pb{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;width:44px}
.pf{height:100%;border-radius:2px;transition:width .3s}
/* subsistema */
.sub{border-top:1px solid var(--bd)}
.sh{display:flex;align-items:center;gap:7px;padding:7px 13px;background:var(--bg3);cursor:pointer;user-select:none}
.sh:active{opacity:.8}
.sd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sn{font-size:12px;font-weight:600;flex:1;color:var(--t2)}
.sc{font-size:11px;color:var(--t3)}
/* tarea */
.tr{border-top:1px solid var(--bd);padding:9px 13px}
.tr.done-r{background:var(--grb)}
.tr-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px}
.chk{width:18px;height:18px;min-width:18px;border-radius:4px;border:2px solid var(--bd2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--bg2);margin-top:1px}
.chk.on{background:var(--gr);border-color:var(--gr)}
.chk.on::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.tn{flex:1;font-size:13px;line-height:1.35}
.tn.dt{color:var(--t2);text-decoration:line-through}
.tt{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;flex-shrink:0;margin-top:2px}
.tA{background:var(--grb);color:var(--grt)}
.tB{background:var(--blb);color:var(--blt)}
.tC{background:var(--amb);color:var(--amt)}
.tD{background:var(--bg3);color:var(--t3)}
/* fases grid */
.fg{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-bottom:6px}
@media(min-width:420px){.fg{grid-template-columns:repeat(4,1fr)}}
.fc{background:var(--bg3);border-radius:var(--rs);padding:7px 8px}
.fc-l{font-size:9px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.fc-m{font-size:11px;font-weight:500;margin-bottom:4px}
.fc-chk{display:flex;align-items:center;gap:4px;margin-bottom:3px;cursor:pointer}
.fc-chk-box{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg2)}
.fc-chk-box.on{background:var(--gr);border-color:var(--gr)}
.fc-chk-box.on::after{content:'✓';color:#fff;font-size:8px;font-weight:700}
.fc-chk-lbl{font-size:10px;color:var(--t2)}
.fc-sel{font-size:11px;padding:3px 5px;border-radius:4px;border:1px solid var(--bd2);background:var(--bg2);color:var(--t);width:100%;cursor:pointer;margin-top:2px}
/* tiempo row */
.tr-t{display:flex;gap:10px;flex-wrap:wrap;padding-top:5px;border-top:1px solid var(--bd);font-size:10px;color:var(--t2)}
.tr-t b{color:var(--t);font-weight:500}
/* progreso subfases */
.sf-prog{display:flex;gap:3px;margin-bottom:5px}
.sf-dot{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
/* ======================== TAB FUERZA ======================== */
.fw{padding:10px 14px 80px}
.sys-g{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
@media(min-width:480px){.sys-g{grid-template-columns:repeat(4,1fr)}}
.fcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:13px;margin-bottom:10px}
.fh{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.fnh{font-size:14px;font-weight:500}
.fsub{font-size:11px;color:var(--t2)}
.fpct{margin-left:auto;text-align:right}
.fpv{font-size:20px;font-weight:600}
.fpl{font-size:10px;color:var(--t2)}
/* 4 fase cards */
.f4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.f4c{background:var(--bg3);border-radius:var(--rs);padding:7px 8px}
.f4l{font-size:9px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.f4v{font-size:13px;font-weight:500}
.f4m{font-size:10px;color:var(--t2);margin-top:1px}
/* barra */
.fbh{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:3px}
.fbar{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden}
.fbar-f{height:100%;border-radius:4px}
/* tiempo grid */
.ftg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:7px}
.ftc{background:var(--bg3);border-radius:var(--rs);padding:6px 8px}
.ftl{font-size:10px;color:var(--t2)}
.ftv{display:flex;gap:5px;margin-top:2px;align-items:baseline}
.ftn{font-size:12px;font-weight:500}
.ftr{font-size:11px;color:var(--am)}
/* leyenda fases */
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--t2);padding:0 14px 8px}
.leg{display:flex;align-items:center;gap:4px}
.leg-d{width:8px;height:8px;border-radius:2px}
/* toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
/* loading */
.ld{text-align:center;padding:40px 20px;color:var(--t2)}
.spin{width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.divider{height:0.5px;background:var(--bd);margin:7px 0}
</style>
</head>

let filtro="t", activeTab="t";
let modOpen = new Set(["0. Cfg. Inicial","1. Contabilidad"]);
let subOpen = new Set();

function r1(x){return Math.round(x*10)/10}

function tMinTotal(t){const f=MINS_F[t.tipo]||MINS_F["—"];return f.analisis+f.desarrollo+f.revision+f.validacion}

function subfasesDone(t){
  return FASES.reduce((s,f)=>s+(t["done_"+f]?1:0),0);
}

function calcKPIs(){
  const total=tareas.length;
  const doneTareas=tareas.filter(t=>t.done==="✓").length;
  const totalSub=total*4;
  const doneSub=tareas.reduce((s,t)=>s+subfasesDone(t),0);
  const ptsT=tareas.reduce((s,t)=>s+PTS[t.tipo],0);
  const ptsDone=tareas.filter(t=>t.done==="✓").reduce((s,t)=>s+PTS[t.tipo],0);
  const minsT=tareas.reduce((s,t)=>s+tMinTotal(t),0);
  const minsDone=tareas.filter(t=>t.done==="✓").reduce((s,t)=>s+tMinTotal(t),0);
  const avPts=ptsT>0?Math.round(ptsDone/ptsT*100):0;
  const avSub=totalSub>0?Math.round(doneSub/totalSub*100):0;
  const avMin=minsT>0?Math.round(minsDone/minsT*100):0;
  const rest=minsT-minsDone;

  document.getElementById("kAv").textContent=avPts+"%";
  document.getElementById("kTr").innerHTML=`<b>${doneTareas}</b>/${total} tar &nbsp; <b>${ptsDone}</b>/${ptsT} pts`;
  document.getElementById("kSub").textContent=avSub+"%";
  document.getElementById("kSubS").innerHTML=`<b>${doneSub}</b>/${totalSub} subfases &nbsp;(${avMin}% min)`;
  document.getElementById("kMin").textContent=minsDone.toLocaleString();
  document.getElementById("kMinS").innerHTML=`<b>${r1(minsDone/(N*D))}</b>d &nbsp;<b>${r1(minsDone/(N*W))}</b>s &nbsp;<b>${r1(minsDone/(N*M))}</b>m`;
  document.getElementById("kRest").textContent=r1(rest/(N*D));
  document.getElementById("kRestS").innerHTML=`<span>${r1(rest/(N*W))}</span> sem &nbsp;<span>${r1(rest/(N*M))}</span> mes`;
}

function visFiltradas(){
  const q=document.getElementById("srch").value.toLowerCase();
  return tareas.filter(t=>{
    const qm=!q||t.tarea.toLowerCase().includes(q)||t.modulo.toLowerCase().includes(q)||t.subsistema.toLowerCase().includes(q);
    const fm=filtro==="t"||(filtro==="d"&&t.done==="✓")||(filtro==="p"&&t.done!=="✓");
    return qm&&fm;
  });
}

function render(){
  const vis=visFiltradas();
  const cont=document.getElementById("modsCont");
  if(!vis.length){cont.innerHTML='<div class="ld">Sin resultados</div>';return}

  const pm={};
  MODS.forEach(m=>pm[m]={});
  vis.forEach(t=>{
    if(!pm[t.modulo])pm[t.modulo]={};
    if(!pm[t.modulo][t.subsistema])pm[t.modulo][t.subsistema]=[];
    pm[t.modulo][t.subsistema].push(t);
  });

  let h="";
  MODS.forEach(mod=>{
    const subs=pm[mod];
    if(!subs||!Object.keys(subs).length)return;
    const all=Object.values(subs).flat();
    const done=all.filter(t=>t.done==="✓").length;
    const doneSub=all.reduce((s,t)=>s+subfasesDone(t),0);
    const totalSub=all.length*4;
    const pct=all.length?Math.round(done/all.length*100):0;
    const pctSub=totalSub?Math.round(doneSub/totalSub*100):0;
    const op=modOpen.has(mod);
    const bg=pct===100?"#1D9E75":pct>0?"#378ADD":"#888780";

    h+=`<div class="mc">
      <div class="mh" onclick="togMod(${JSON.stringify(mod)})">
        <span class="chev ${op?"op":""}">&#9654;</span>
        <span class="mn">${mod}</span>
        <div class="ms">
          <span class="pp" style="background:${bg}">${pct}%</span>
          <div class="pb"><div class="pf" style="width:${pct}%;background:${bg}"></div></div>
          <span style="font-size:10px;color:var(--t3)">${done}/${all.length} | ${doneSub}/${totalSub} sf</span>
        </div>
      </div>`;

    if(op){
      SUBS.forEach(sub=>{
        const items=subs[sub];
        if(!items||!items.length)return;
        const dc=CAT_C[sub]||"#888";
        const dt=items.filter(t=>t.done==="✓").length;
        const ds=items.reduce((s,t)=>s+subfasesDone(t),0);
        const ts=items.length*4;
        const sk=mod+"||"+sub;
        const sop=subOpen.has(sk);

        h+=`<div class="sub">
          <div class="sh" onclick="togSub(${JSON.stringify(sk)})">
            <span class="sd" style="background:${dc}"></span>
            <span class="sn">${sub}</span>
            <span class="sc">${dt}/${items.length} tar &nbsp; ${ds}/${ts} sf</span>
          </div>`;

        if(sop){
          items.forEach(t=>{
            const done=t.done==="✓";
            const tc=t.tipo==="A"?"tA":t.tipo==="B"?"tB":t.tipo==="C"?"tC":"tD";
            const f=MINS_F[t.tipo]||MINS_F["—"];
            const mT=f.analisis+f.desarrollo+f.revision+f.validacion;

            // dots de progreso subfases
            const dots=FASES.map(fase=>{
              const on=t["done_"+fase];
              return `<span class="sf-dot" style="background:${on?FASE_C[fase]:"var(--bg3)"}; color:${on?"#fff":"var(--t3)"}">${on?"✓":"·"}</span>`;
            }).join("");

            const fasesHtml=FASES.map(fase=>{
              const on=t["done_"+fase];
              const mins=f[fase];
              const resp=t["resp_"+fase]||"";
              const opts=MIEMB.map(m=>`<option value="${m.replace(/"/g,"&quot;")}"${resp===m?" selected":""}>${m||"—"}</option>`).join("");
              return `<div class="fc" style="border-top:2px solid ${FASE_C[fase]}">
                <div class="fc-l" style="color:${FASE_C[fase]}">${FASE_L[fase]} · ${mins}min</div>
                <div class="fc-chk" onclick="togFase(${t.id},'${fase}')">
                  <span class="fc-chk-box ${on?"on":""}"></span>
                  <span class="fc-chk-lbl">${on?"Completado":"Pendiente"}</span>
                </div>
                <select class="fc-sel" onchange="updResp(${t.id},'resp_${fase}',this.value)">${opts}</select>
              </div>`;
            }).join("");

            h+=`<div class="tr ${done?"done-r":""}">
              <div class="tr-top">
                <div class="chk ${done?"on":""}" onclick="togDone(${t.id})"></div>
                <span class="tn ${done?"dt":""}">${t.tarea}</span>
                <span class="tt ${tc}">${t.tipo}</span>
              </div>
              <div style="display:flex;gap:4px;align-items:center;margin-bottom:5px">
                ${dots}
                <span style="font-size:10px;color:var(--t3);margin-left:4px">${subfasesDone(t)}/4 fases</span>
              </div>
              <div class="fg">${fasesHtml}</div>
              <div class="tr-t">
                <span>Total: <b>${mT} min</b></span>
                <span>Días: <b>${r1(mT/D)}</b></span>
                <span>Sem: <b>${r1(mT/W)}</b></span>
                <span>Mes: <b>${r1(mT/M)}</b></span>
              </div>
            </div>`;
          });
        }
        h+=`</div>`;
      });
    }
    h+=`</div>`;
  });
  cont.innerHTML=h;
}

  const doneSub=tareas.reduce((s,t)=>s+subfasesDone(t),0);

  let h=`<div class="sys-g">
    <div class="kc"><div class="kv" style="color:var(--gr)">${minsDone.toLocaleString()} min</div><div class="kl">Consumidos equipo</div>
      <div class="ks"><b>${r1(minsDone/(N*D))}</b>d &nbsp;<b>${r1(minsDone/(N*W))}</b>s &nbsp;<b>${r1(minsDone/(N*M))}</b>m</div></div>
    <div class="kc"><div class="kv" style="color:var(--am)">${minsRest.toLocaleString()} min</div><div class="kl">Restantes equipo</div>
      <div class="ks"><span>${r1(minsRest/(N*D))}</span>d &nbsp;<span>${r1(minsRest/(N*W))}</span>s &nbsp;<span>${r1(minsRest/(N*M))}</span>m</div></div>
    <div class="kc"><div class="kv" style="color:var(--t2)">${minsTotal.toLocaleString()} min</div><div class="kl">Total sistema</div>
      <div class="ks"><b>${r1(minsTotal/(N*D))}</b>d &nbsp;<b>${r1(minsTotal/(N*W))}</b>s</div></div>
    <div class="kc"><div class="kv" style="color:var(--pu)">${doneSub}/${TOTAL_SUBFASES}</div><div class="kl">Subfases completadas</div>
      <div class="ks"><b>${Math.round(doneSub/TOTAL_SUBFASES*100)}%</b> avance</div></div>
  </div>`;

  ["Julio César","Eunice","Joshua","Cristian"].forEach(m=>{
    const f=mf[m]||{analisis:0,desarrollo:0,revision:0,validacion:0};
    const tot=f.analisis+f.desarrollo+f.revision+f.validacion;
    const pct=totEq>0?r1(tot/totEq*100):0;
    const col=COLORES[m]||["#f1efe8","#444","#888"];
    const ini=INI[m]||m.slice(0,2).toUpperCase();
    h+=`<div class="fcard">
      <div class="fh">
        <div class="av" style="background:${col[0]};color:${col[1]}">${ini}</div>
        <div><div class="fnh">${m}</div><div class="fsub">${pct}% fuerza de trabajo</div></div>
        <div class="fpct"><div class="fpv" style="color:${col[1]}">${pct}%</div><div class="fpl">fuerza</div></div>
      </div>
      <div class="f4">
        ${FASES.map(fase=>`<div class="f4c" style="border-top:2px solid ${FASE_C[fase]}">
          <div class="f4l" style="color:${FASE_C[fase]}">${FASE_L[fase]}</div>
          <div class="f4v" style="color:${col[1]}">${f[fase].toLocaleString()} min</div>
          <div class="f4m">${r1(f[fase]/60)}h &nbsp;·&nbsp; ${r1(f[fase]/D)} días</div>
        </div>`).join("")}
      </div>
      <div class="divider"></div>
      <div class="fbh"><span>Fuerza acumulada</span><span><b>${tot.toLocaleString()} min · ${r1(tot/60)}h · ${r1(tot/W)} sem</b></span></div>
      <div class="fbar"><div class="fbar-f" style="width:${pct}%;background:${col[2]}"></div></div>
      <div class="ftg">
        <div class="ftc"><div class="ftl">Minutos totales</div><div class="ftv"><span class="ftn">${tot.toLocaleString()}</span></div></div>
        <div class="ftc"><div class="ftl">Días · Semanas</div><div class="ftv"><span class="ftn">${r1(tot/D)}</span><span class="ftr">· ${r1(tot/W)}</span></div></div>
        <div class="ftc"><div class="ftl">Meses consumidos</div><div class="ftv"><span class="ftn">${r1(tot/M)}</span></div></div>
      </div>
    </div>`;
  });
  document.getElementById("fuerzaCont").innerHTML=h;
}

// === ACCIONES ===
function togDone(id){
  const t=tareas.find(x=>x.id===id); if(!t)return;
  t.done=t.done==="✓"?"":"✓";
  // Marcar/desmarcar todas las subfases
  FASES.forEach(f=>t["done_"+f]=t.done==="✓");
  upd();
  toast(t.done==="✓"?"✓ Tarea completa":"Tarea desmarcada");
  sync("updateDone",{id,valor:t.done==="✓"});
}

function togFase(id,fase){
  const t=tareas.find(x=>x.id===id); if(!t)return;
  t["done_"+fase]=!t["done_"+fase];
  // Si todas las fases están done → marcar tarea done
  const allDone=FASES.every(f=>t["done_"+f]);
  t.done=allDone?"✓":"";
  upd();
  toast(t["done_"+fase]?`✓ ${FASE_L[fase]} completado`:`${FASE_L[fase]} desmarcado`);
  sync("updateFase",{id,campo:"done_"+fase,valor:t["done_"+fase]?"✓":""});
  if(allDone) sync("updateDone",{id,valor:true});
}

function updResp(id,campo,valor){
  const t=tareas.find(x=>x.id===id); if(!t)return;
  t[campo]=valor;
  if(activeTab==="f") renderFuerza();
  sync("updateFase",{id,campo,valor});
}

function upd(){calcKPIs();render();if(activeTab==="f")renderFuerza()}

function togMod(m){modOpen.has(m)?modOpen.delete(m):modOpen.add(m);render()}
function togSub(k){subOpen.has(k)?subOpen.delete(k):subOpen.add(k);render()}
function filt(f,btn){filtro=f;document.querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));btn.classList.add("on");render()}

function tab(t,btn){
  activeTab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));btn.classList.add("on");
  document.getElementById("pT").style.display=t==="t"?"block":"none";
  document.getElementById("pF").style.display=t==="f"?"block":"none";
  if(t==="f")renderFuerza();
}

// === SYNC ===
async function sync(action,data){
  if(URL_GAS==="TU_URL_DE_APPS_SCRIPT_AQUI")return;
  try{await fetch(URL_GAS,{method:"POST",body:JSON.stringify({action,...data})});}catch(e){}
}

async function guardar(){
  if(URL_GAS==="TU_URL_DE_APPS_SCRIPT_AQUI"){toast("Configura la URL de Apps Script primero");return}
  toast("Guardando todo...");
  const payload=tareas.map(t=>({
    id:t.id, done:t.done,
    done_analisis:t.done_analisis?"✓":"",
    done_desarrollo:t.done_desarrollo?"✓":"",
    done_revision:t.done_revision?"✓":"",
    done_validacion:t.done_validacion?"✓":"",
    resp_analisis:t.resp_analisis||"",
    resp_desarrollo:t.resp_desarrollo||"",
    resp_revision:t.resp_revision||"",
    resp_validacion:t.resp_validacion||""
  }));
  try{
    const r=await fetch(URL_GAS,{method:"POST",body:JSON.stringify({action:"bulkUpdate",tareas:payload})});
    const d=await r.json();
    toast(d.ok?`Guardado ✓ (${d.updated} tareas)`:"Error al guardar");
  }catch(e){toast("Error de conexión")}
}

async function sincronizar(){
  if(URL_GAS==="TU_URL_DE_APPS_SCRIPT_AQUI"){toast("Modo demo — configura la URL");return}
  toast("Sincronizando...");
  try{
    const r=await fetch(URL_GAS+"?action=getTareas");
    const d=await r.json();
    if(d.ok){
      d.tareas.forEach(rem=>{
        const loc=tareas.find(t=>t.id==rem.id);
        if(!loc)return;
        loc.done=rem.done||"";
        FASES.forEach(f=>{loc["done_"+f]=rem["done_"+f]==="✓";});
        ["resp_analisis","resp_desarrollo","resp_revision","resp_validacion"].forEach(c=>{loc[c]=rem[c]||""});
      });
      upd();
      toast("Sincronizado ✓");
    }
  }catch(e){toast("Error de conexión")}
}

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("on");
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("on"),2400);
}

// INIT
calcKPIs();
render();
</script>
