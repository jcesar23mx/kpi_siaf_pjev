        var dc=CC[sub]||"#888";
        var dt=0,ds2=0;
        items.forEach(function(t){if(t.done==="\u2713")dt++;ds2+=sf(t)});
        var sk=mod+"||"+sub,sop=so.has(sk);
        h+='<div class="sub">';
        h+='<div class="sh" onclick="togS('+JSON.stringify(sk)+')">';
        h+='<span class="sd" style="background:'+dc+'"></span>';
        h+='<span class="sn">'+sub+'</span>';
        h+='<span class="sc">'+dt+'/'+items.length+' | '+ds2+'/'+(items.length*4)+'sf</span></div>';
        if(sop){
          items.forEach(function(t){
            var dn=t.done==="\u2713";
            var tc=t.tipo==="A"?"tA":t.tipo==="B"?"tB":t.tipo==="C"?"tC":"tX";
            var f=MF[t.tipo]||{analisis:0,desarrollo:0,revision:0,validacion:0};
            var mT=f.analisis+f.desarrollo+f.revision+f.validacion;
            var dots=FS.map(function(fa){
              var on=t["done_"+fa];
              return '<span class="sfd" style="background:'+(on?FC[fa]:"var(--bg3)")+';color:'+(on?"#fff":"var(--t3)")+'">'+( on?"&#10003;":"&middot;")+'</span>';
            }).join("");
            var fasH=FS.map(function(fa){
              var on=t["done_"+fa];
              var mins=f[fa];
              var resp=t["resp_"+fa]||"";
              var opts=MB.map(function(m){return '<option value="'+m+'"'+(resp===m?" selected":"")+'>'+( m||"-")+'</option>'}).join("");
              return '<div class="fc" style="border-top:2px solid '+FC[fa]+';">'
                +'<div class="fl2" style="color:'+FC[fa]+'">'+FL[fa]+' &middot; '+mins+'m</div>'
                +'<div class="fck" onclick="togF('+t.id+',"'+fa+'")">'
                +'<span class="fckb '+(on?"on":"")+'"></span>'
                +'<span class="fckl">'+(on?"Listo":"Pendiente")+'</span></div>'
                +'<select class="fcs" onchange="updR('+t.id+',"resp_'+fa+'",this.value)">'+opts+'</select></div>';
            }).join("");
            h+='<div class="tr '+(dn?"dr":"")+'"><div class="tr-top">';
            h+='<div class="chk '+(dn?"on":"")+'" onclick="togD('+t.id+')"></div>';
            h+='<span class="tn '+(dn?"dt":"")+'">'+t.tarea+'</span>';
            h+='<span class="tt '+tc+'">'+t.tipo+'</span></div>';
            h+='<div class="sfp">'+dots+'<span style="font-size:10px;color:var(--t3);margin-left:4px">'+sf(t)+'/4</span></div>';
            h+='<div class="fg">'+fasH+'</div>';
            h+='<div class="tr-t"><span>Total: <b>'+mT+' min</b></span><span>Dias: <b>'+r1(mT/D)+'</b></span><span>Sem: <b>'+r1(mT/W)+'</b></span></div></div>';
          });
        }
        h+='</div>';
      });
    }
    h+='</div>';
  });
  cont.innerHTML=h;
}
function renderF(){
  var mf={};
  MB.filter(function(m){return m}).forEach(function(m){mf[m]={analisis:0,desarrollo:0,revision:0,validacion:0}});
  T.forEach(function(t){
    FS.forEach(function(fa){
      if(!t["done_"+fa])return;
      var resp=t["resp_"+fa];
      if(resp&&mf[resp]){var f=MF[t.tipo]||{analisis:0,desarrollo:0,revision:0,validacion:0};mf[resp][fa]+=f[fa]}
    });
  });
  var totEq=Object.values(mf).reduce(function(s,v){return s+v.analisis+v.desarrollo+v.revision+v.validacion},0);
  var md=T.filter(function(t){return t.done==="\u2713"}).reduce(function(s,t){return s+tm(t)},0);
  var mt=T.reduce(function(s,t){return s+tm(t)},0);
  var mr=mt-md;
  var dsf=T.reduce(function(s,t){return s+sf(t)},0);
  var h='<div class="sg">';
  h+='<div class="kc"><div class="kv" style="color:var(--gr)">'+md.toLocaleString()+' min</div><div class="kl">Consumidos equipo</div><div class="ks"><b>'+r1(md/(N*D))+'</b>d &nbsp;<b>'+r1(md/(N*W))+'</b>s</div></div>';
  h+='<div class="kc"><div class="kv" style="color:var(--am)">'+mr.toLocaleString()+' min</div><div class="kl">Restantes equipo</div><div class="ks"><span>'+r1(mr/(N*D))+'</span>d &nbsp;<span>'+r1(mr/(N*W))+'</span>s</div></div>';
  h+='<div class="kc"><div class="kv" style="color:var(--t2)">'+mt.toLocaleString()+' min</div><div class="kl">Total sistema</div><div class="ks"><b>'+r1(mt/(N*D))+'</b>d &nbsp;<b>'+r1(mt/(N*W))+'</b>s</div></div>';
  h+='<div class="kc"><div class="kv" style="color:var(--pu)">'+dsf+'/504</div><div class="kl">Subfases completas</div><div class="ks"><b>'+Math.round(dsf/504*100)+'%</b></div></div></div>';
  ["Julio C\u00e9sar","Eunice","Joshua","Cristian"].forEach(function(m){
    var f=mf[m]||{analisis:0,desarrollo:0,revision:0,validacion:0};
    var tot=f.analisis+f.desarrollo+f.revision+f.validacion;
    var pct=totEq>0?r1(tot/totEq*100):0;
    var col=COL[m]||["#f1efe8","#444","#888"];
    var ini=INI[m]||m.slice(0,2).toUpperCase();
    h+='<div class="fcard">';
    h+='<div class="fh"><div class="av" style="background:'+col[0]+';color:'+col[1]+'">'+ini+'</div>';
    h+='<div><div class="fnh">'+m+'</div><div class="fsb">'+pct+'% fuerza de trabajo</div></div>';
    h+='<div class="fpc"><div class="fpv" style="color:'+col[1]+'">'+pct+'%</div><div class="fpl">fuerza</div></div></div>';
    h+='<div class="f4">';
    FS.forEach(function(fa){
      h+='<div class="f4c" style="border-top:2px solid '+FC[fa]+';">';
      h+='<div class="f4l" style="color:'+FC[fa]+'">'+FL[fa]+'</div>';
      h+='<div class="f4v" style="color:'+col[1]+'">'+f[fa].toLocaleString()+' min</div>';
      h+='<div class="f4m">'+r1(f[fa]/60)+'h &middot; '+r1(f[fa]/D)+' dias</div></div>';
    });
    h+='</div><div class="dv"></div>';
    h+='<div class="fbh"><span>Fuerza acumulada</span><span><b>'+tot.toLocaleString()+' min &middot; '+r1(tot/60)+'h &middot; '+r1(tot/W)+' sem</b></span></div>';
    h+='<div class="fbar"><div class="fbar-f" style="width:'+pct+'%;background:'+col[2]+'"></div></div>';
    h+='<div class="ftg">';
    h+='<div class="ftc"><div class="ftl">Minutos</div><div class="ftv"><span class="ftn">'+tot.toLocaleString()+'</span></div></div>';
    h+='<div class="ftc"><div class="ftl">Dias / Semanas</div><div class="ftv"><span class="ftn">'+r1(tot/D)+'</span><span class="ftr">&middot; '+r1(tot/W)+'</span></div></div>';
    h+='<div class="ftc"><div class="ftl">Meses</div><div class="ftv"><span class="ftn">'+r1(tot/M)+'</span></div></div>';
    h+='</div></div>';
  });
  ck("FC").innerHTML=h;
}
function togD(id){
  var t=T.find(function(x){return x.id===id});if(!t)return;
  t.done=t.done==="\u2713"?"":"\u2713";
  FS.forEach(function(f){t["done_"+f]=t.done==="\u2713"});
  upd();toast(t.done==="\u2713"?"Tarea completa":"Desmarcada");
  post({action:"updateDone",id:id,valor:t.done==="\u2713"});
}
function togF(id,fa){
  var t=T.find(function(x){return x.id===id});if(!t)return;
  t["done_"+fa]=!t["done_"+fa];
  t.done=FS.every(function(f){return t["done_"+f]})?"\u2713":"";
  upd();toast(t["done_"+fa]?FL[fa]+" listo":FL[fa]+" desmarcado");
  post({action:"updateFase",id:id,campo:"done_"+fa,valor:t["done_"+fa]?"\u2713":""});
}
function updR(id,campo,valor){
  var t=T.find(function(x){return x.id===id});if(!t)return;
  t[campo]=valor;
  if(at==="f")renderF();
  post({action:"updateFase",id:id,campo:campo,valor:valor});
}
function upd(){calcK();render();if(at==="f")renderF()}
function togM(m){mo.has(m)?mo.delete(m):mo.add(m);render()}
function togS(k){so.has(k)?so.delete(k):so.add(k);render()}
function filt(f,btn){fi=f;document.querySelectorAll(".fb").forEach(function(b){b.classList.remove("on")});btn.classList.add("on");render()}
function cambiaTab(t,btn){
  at=t;
  document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("on")});btn.classList.add("on");
  ck("pT").style.display=t==="t"?"block":"none";
  ck("pF").style.display=t==="f"?"block":"none";
  if(t==="f")renderF();
}
function post(data){
  try{fetch(GAS,{method:"POST",body:JSON.stringify(data)})}catch(e){}
}
function guardar(){
  toast("Guardando...");
  var payload=T.map(function(t){return {
    id:t.id,done:t.done,
    done_analisis:t.done_analisis?"\u2713":"",
    done_desarrollo:t.done_desarrollo?"\u2713":"",
    done_revision:t.done_revision?"\u2713":"",
    done_validacion:t.done_validacion?"\u2713":"",
    resp_analisis:t.resp_analisis||"",
    resp_desarrollo:t.resp_desarrollo||"",
    resp_revision:t.resp_revision||"",
    resp_validacion:t.resp_validacion||""
  }});
  fetch(GAS,{method:"POST",body:JSON.stringify({action:"bulkUpdate",tareas:payload})})
    .then(function(r){return r.json()})
    .then(function(d){toast(d.ok?"Guardado ("+d.updated+" tareas)":"Error al guardar")})
    .catch(function(){toast("Error de conexion")});
}
function sincronizar(){
  toast("Sincronizando...");
  fetch(GAS+"?action=getTareas")
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.ok){toast("Error del servidor");return}
      d.tareas.forEach(function(rem){
        var loc=T.find(function(t){return t.id==rem.id});
        if(!loc)return;
        loc.done=rem.done||"";
        FS.forEach(function(f){loc["done_"+f]=rem["done_"+f]==="\u2713"});
        ["resp_analisis","resp_desarrollo","resp_revision","resp_validacion"].forEach(function(c){loc[c]=rem[c]||""});
      });
      upd();toast("Sincronizado");
    })
    .catch(function(){toast("Error de conexion")});
}
function toast(msg){
  var el=ck("tst");el.textContent=msg;el.classList.add("on");
  clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove("on")},2400);
}
calcK();
render();
</script>
</body>
</html>
